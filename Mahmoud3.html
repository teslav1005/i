<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حذف الحساب - Afnan ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%);
            font-family: system-ui, -apple-system, sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .code-input {
            font-size: 24px;
            letter-spacing: 8px;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }

        .code-input:focus {
            outline: none;
            border-color: #000 !important;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: slideIn 0.3s ease-out;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass p-8 rounded-3xl text-center max-w-md w-full shadow-2xl animate-in">
        <!-- Logo -->
        <div class="mb-6">
            <img src="https://i.postimg.cc/TYd6FZy0/grok-image-x6em5fj-edit-96291120058942.png" alt="Afnan ai" class="w-16 h-16 mx-auto mb-4">
            <h1 class="text-3xl font-bold text-gray-900">Afnan ai</h1>
        </div>

        <!-- Title -->
        <h2 class="text-2xl font-bold text-gray-900 mb-2">تأكيد حذف الحساب</h2>
        <p class="text-gray-600 mb-8">تم إرسال رمز التحقق إلى بريدك الإلكتروني. يرجى إدخاله أدناه.</p>

        <!-- Verification Code Input -->
        <div class="mb-8">
            <label class="block text-sm font-bold text-gray-700 mb-3">رمز التحقق (7 أرقام)</label>
            <input 
                type="text" 
                id="verificationCode" 
                class="code-input w-full px-4 py-4 border-2 border-gray-300 rounded-2xl bg-white focus:border-black transition-all"
                placeholder="0000000"
                maxlength="7"
                inputmode="numeric"
            >
            <p class="text-xs text-gray-500 mt-2">الرمز صالح لمدة 15 دقيقة فقط</p>
        </div>

        <!-- Warning -->
        <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-lg mb-8 text-right">
            <p class="text-sm text-red-700 font-bold">⚠️ تنبيه مهم</p>
            <p class="text-xs text-red-600 mt-2">هذا الإجراء لا يمكن التراجع عنه. سيتم حذف جميع بيانات حسابك والمحادثات الخاصة بك بشكل نهائي.</p>
        </div>

        <!-- Buttons -->
        <div class="flex gap-4 flex-col">
            <button 
                id="confirmBtn" 
                class="w-full bg-black text-white py-3 rounded-2xl font-bold hover:bg-gray-900 transition-all active:scale-95"
            >
                تأكيد الحذف
            </button>
            <button 
                onclick="window.history.back()" 
                class="w-full bg-gray-100 text-gray-800 py-3 rounded-2xl font-bold hover:bg-gray-200 transition-all"
            >
                إلغاء
            </button>
        </div>

        <!-- Resend Code -->
        <div class="mt-8 pt-8 border-t border-gray-200">
            <p class="text-sm text-gray-600 mb-3">لم تستقبل الرمز؟</p>
            <button 
                id="resendBtn" 
                class="text-blue-600 hover:text-blue-700 font-bold text-sm"
            >
                إعادة إرسال الرمز
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-full text-sm font-bold opacity-0 transition-opacity duration-300 pointer-events-none"></div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC89TjMlrtfh88o_HDgCHD42hAvXMZ6fQM",
            authDomain: "afnan-49d21.firebaseapp.com",
            projectId: "afnan-49d21",
            storageBucket: "afnan-49d21.firebasestorage.app",
            messagingSenderId: "886430112619",
            appId: "1:886430112619:web:278b9ea777f4dda77b0a2e",
            measurementId: "G-EWMJ8ZPY7X"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const toast = document.getElementById('toast');
        const verificationCodeInput = document.getElementById('verificationCode');
        const confirmBtn = document.getElementById('confirmBtn');
        const resendBtn = document.getElementById('resendBtn');

        // Only allow numbers
        verificationCodeInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });

        // Confirm deletion
        confirmBtn.addEventListener('click', async () => {
            const code = verificationCodeInput.value.trim();

            if (code.length !== 7) {
                showToast('يرجى إدخال رمز مكون من 7 أرقام', 'error');
                return;
            }

            confirmBtn.disabled = true;
            confirmBtn.textContent = 'جارٍ المعالجة...';

            try {
                const user = auth.currentUser;
                if (!user) {
                    window.location.href = 'login.html';
                    return;
                }

                // Call backend to verify code and delete account
                const response = await fetch('https://your-backend-domain.com/verify-and-delete-account', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        uid: user.uid,
                        code: code
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showToast('تم حذف الحساب بنجاح', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    showToast(data.error || 'خطأ في التحقق من الرمز', 'error');
                    confirmBtn.disabled = false;
                    confirmBtn.textContent = 'تأكيد الحذف';
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('خطأ: ' + error.message, 'error');
                confirmBtn.disabled = false;
                confirmBtn.textContent = 'تأكيد الحذف';
            }
        });

        // Resend code
        resendBtn.addEventListener('click', async () => {
            try {
                const user = auth.currentUser;
                if (!user) {
                    window.location.href = 'login.html';
                    return;
                }

                resendBtn.disabled = true;
                const originalText = resendBtn.textContent;
                resendBtn.textContent = 'جارٍ الإرسال...';

                // Generate new code
                const newCode = Math.floor(Math.random() * 10000000).toString().padStart(7, '0');

                // Send email with new code
                const response = await fetch('https://your-backend-domain.com/send-verification-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: user.email,
                        code: newCode,
                        name: user.displayName || 'User'
                    })
                });

                if (response.ok) {
                    showToast('تم إعادة إرسال الرمز بنجاح', 'success');
                    verificationCodeInput.value = '';
                    verificationCodeInput.focus();
                    
                    // Re-enable after 30 seconds
                    setTimeout(() => {
                        resendBtn.disabled = false;
                        resendBtn.textContent = originalText;
                    }, 30000);
                } else {
                    showToast('خطأ في إعادة الإرسال', 'error');
                    resendBtn.disabled = false;
                    resendBtn.textContent = originalText;
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('خطأ: ' + error.message, 'error');
                resendBtn.disabled = false;
                resendBtn.textContent = 'إعادة إرسال الرمز';
            }
        });

        // Show toast notification
        function showToast(message, type = 'success') {
            toast.textContent = message;
            toast.className = `fixed bottom-10 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full text-sm font-bold opacity-100 transition-opacity duration-300 ${
                type === 'error' ? 'bg-red-600' : 'bg-green-600'
            } text-white`;
            
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 3000);
        }

        // Focus on input on load
        window.addEventListener('load', () => {
            verificationCodeInput.focus();
        });
    </script>
</body>
</html>
