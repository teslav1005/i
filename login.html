<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Welcome to Afnan ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%);
            color: #000000;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }
        .btn-social {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-social:active {
            transform: scale(0.96);
        }
        ::-webkit-scrollbar { display: none; }
        
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #000;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
    <script src="security.js"></script>
</head>
<body class="flex flex-col items-center justify-between min-h-screen p-8 pb-12">

    <!-- Header -->
    <div class="w-full flex justify-between items-center">
        <div class="bg-[#f0f0f0] px-4 py-1.5 rounded-lg text-xs font-bold text-gray-600 cursor-pointer hover:bg-[#e0e0e0]">
            EN
        </div>
        <div class="w-10 h-10 flex items-center justify-center">
            <img src="https://i.postimg.cc/TYd6FZy0/grok-image-x6em5fj-edit-96291120058942.png" alt="Logo" class="w-8 h-8">
        </div>
    </div>

    <!-- Hero Content -->
    <div class="flex-1 flex flex-col items-center justify-center text-center space-y-4 w-full max-w-sm">
        <h1 class="text-4xl font-bold tracking-tight">Welcome to Afnan ai</h1>
        <p class="text-gray-500 text-lg">ابدأ رحلتك الإبداعية الآن</p>
    </div>

    <!-- Auth Buttons -->
    <div class="w-full max-w-sm space-y-10">
        <div class="text-center">
            <span class="text-[10px] uppercase tracking-[0.2em] text-gray-400 font-bold">LOGIN TO CONTINUE</span>
        </div>

        <div class="space-y-3">
            <!-- Google -->
            <button id="googleLogin" class="btn-social w-full bg-black text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-gray-900 shadow-xl shadow-black/5">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.84z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
                </svg>
                <span>Google Log in</span>
            </button>

            <!-- GitHub -->
            <button id="githubLogin" class="btn-social w-full bg-[#f8f8f8] text-gray-800 py-4 rounded-2xl font-bold flex items-center justify-center gap-3 border border-gray-200 hover:bg-[#f0f0f0]">
                <i class="fa-brands fa-github text-xl"></i>
                <span>GitHub Login</span>
            </button>
        </div>
    </div>

    <!-- Error Toast -->
    <div id="toast" class="fixed bottom-10 bg-red-600 text-white px-6 py-3 rounded-full text-sm font-bold opacity-0 transition-opacity duration-300 pointer-events-none"></div>

    <!-- iPhone Bottom Indicator -->
    <div class="w-32 h-1.5 bg-[#f0f0f0] rounded-full mt-8"></div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { auth } from './api.js';
        import { signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const googleProvider = new GoogleAuthProvider();
        const btn = document.getElementById('googleLogin');
        const toast = document.getElementById('toast');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.navigateToPage('index.html');
            }
        });

        btn.onclick = async () => {
            btn.disabled = true;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<div class="loader"></div>';

            try {
                await signInWithPopup(auth, googleProvider);
                window.navigateToPage('index.html');
            } catch (err) {
                console.error(err);
                btn.innerHTML = originalText;
                btn.disabled = false;
                toast.textContent = "خطأ في تسجيل الدخول، حاول مرة أخرى";
                toast.style.opacity = '1';
                setTimeout(() => toast.style.opacity = '0', 3000);
            }
        };

        document.getElementById('githubLogin').onclick = () => {
            toast.textContent = "GitHub login coming soon";
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 3000);
        };
    </script>
</body>
</html>
