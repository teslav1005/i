<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Afnan ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="security.js"></script>
    
    <style>
        :root { --header-h: 60px; }
        html, body { height: var(--app-height); width: 100%; margin: 0; padding: 0; overflow: auto; overscroll-behavior: contain; background-color: white; -webkit-tap-highlight-color: transparent; font-family: system-ui, -apple-system, sans-serif; }
        @supports (-webkit-touch-callout: none) {
            body {
                height: -webkit-fill-available;
            }
        }
        body { display: flex; flex-direction: row; }
        .hide-scrollbar::-webkit-scrollbar { width: 0px; height: 0px; }
        .hide-scrollbar { scrollbar-width: none; }
        .sidebar-transition { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); will-change: transform; }
        #overlay { z-index: 100; } /* تم رفعه ليكون فوق الهيدر */
        #sidebar { z-index: 150; } /* تم رفعه ليكون فوق الهيدر والأوفرلاي */
        header { 
            z-index: 50; /* تم خفضه لضمان ظهور السايدبار فوقه */
            position: relative;
            width: 100%;
            height: var(--header-h);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transform: translateZ(0);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        /* ضمان أن المحتوى يمر تحت الهيدر بسلاسة */
        #chatWindow {
            padding-top: 10px;
            margin-top: 0;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-msg { animation: slideUp 0.3s ease-out forwards; }
        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
        
        /* Glassy Effect */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Profile Popup */
        #profilePopup {
            display: none;
            position: absolute;
            bottom: 70px;
            left: 10px;
            width: 220px;
            z-index: 200;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* Logout Confirm */
        #logoutConfirm {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }
        
        /* Attachment Menu */
        #attachMenu {
            display: none;
            position: absolute;
            bottom: 70px;
            right: 0;
            width: 200px;
            z-index: 60;
            border-radius: 1.2rem;
        }

        .action-icon {
            cursor: pointer;
            transition: color 0.2s;
            color: #9ca3af;
        }
        .action-icon:hover { color: #3b82f6; }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #9ca3af;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        .chat-input-container {
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            -webkit-tap-highlight-color: transparent;
        }

        .chat-input-container:focus-within {
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
        }
        
        textarea#chatInput {
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            -webkit-appearance: none;
            background: transparent !important;
        }
        
        textarea#chatInput:focus {
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            background: transparent !important;
        }
        
        /* إزالة أي حواف سوداء افتراضية في المتصفحات */
        input:focus, textarea:focus, select:focus, button:focus {
            outline: none !important;
            box-shadow: none !important;
        }

        /* Image Preview */
        .image-preview {
            max-width: 300px;
            max-height: 300px;
            border-radius: 1rem;
            object-fit: cover;
            margin-top: 8px;
        }

        /* Guest Warning */
        .guest-warning {
            display: none; /* تم إخفاؤها كما طلبت */
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 12px;
            border-radius: 0.5rem;
            margin-bottom: 16px;
            font-size: 13px;
            color: #92400e;
        }
    </style>
    <script>
        function setAppHeight() {
            document.documentElement.style.setProperty(
                '--app-height',
                `${window.innerHeight}px`
            );
        }
        window.addEventListener('resize', setAppHeight);
        setAppHeight();

        // Fix header position when keyboard opens
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                const header = document.querySelector('header');
                if (header) {
                    header.style.top = window.visualViewport.offsetTop + 'px';
                }
            });
            window.visualViewport.addEventListener('scroll', () => {
                const header = document.querySelector('header');
                if (header) {
                    header.style.top = window.visualViewport.offsetTop + 'px';
                }
            });
        }

        // URL Masking is now handled by security.js to prevent 404 errors.

        // Pull to Refresh Logic
        let startY = 0;
        let pulling = false;
        document.addEventListener("DOMContentLoaded", () => {
            const indicator = document.getElementById("pullRefresh");
            window.addEventListener("touchstart", (e) => {
                if (window.scrollY === 0) {
                    startY = e.touches[0].clientY;
                    pulling = true;
                }
            });
            window.addEventListener("touchmove", (e) => {
                if (!pulling) return;
                let diff = e.touches[0].clientY - startY;
                if (diff > 0) {
                    indicator.style.top = Math.min(diff - 50, 20) + "px";
                }
                if (diff > 120) {
                    indicator.innerText = "↻ سيتم التحديث...";
                } else {
                    indicator.innerText = "⟳ اسحب للتحديث";
                }
            });
            window.addEventListener("touchend", (e) => {
                if (!pulling) return;
                let diff = e.changedTouches[0].clientY - startY;
                indicator.style.top = "-50px";
                pulling = false;
                if (diff > 120) {
                    location.reload();
                }
            });
        });
    </script>
</head>
<body class="antialiased text-gray-900">

    <div id="pullRefresh" style="position: fixed; top: -50px; left: 0; right: 0; text-align: center; transition: 0.3s; font-size: 14px; color: gray; z-index: 1000;">
        ⟳ اسحب للتحديث
    </div>

    <div id="overlay" class="fixed inset-0 bg-black/20 backdrop-blur-[2px] hidden transition-opacity duration-300 opacity-0"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 w-72 bg-[#fcfcfc] border-r border-gray-100 flex flex-col transform -translate-x-full md:translate-x-0 sidebar-transition h-full shadow-lg md:shadow-none">
        <div class="p-4 flex flex-col gap-4">
            <button id="newChatBtn" class="flex items-center gap-3 w-full bg-white border border-gray-200 p-3.5 rounded-2xl hover:bg-gray-50 transition-all shadow-sm">
                <img src="https://i.postimg.cc/TYd6FZy0/grok-image-x6em5fj-edit-96291120058942.png" alt="Logo" class="w-5 h-5">
                <span class="font-bold text-gray-700 text-sm">محادثة جديدة</span>
            </button>
        </div>
        
        <div class="flex-1 overflow-y-auto px-4 space-y-2 hide-scrollbar" id="historyList">

        </div>

        <div class="p-4 border-t border-gray-100 space-y-1">

            <a href="https://service.afnanai.com" target="_blank" class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-100 transition-all text-gray-600">
                <i class="fa-solid fa-headset"></i>

            </a>
            <!-- Shared Links Management -->
            <button onclick="showShareModal()" class="flex items-center gap-3 w-full p-3 rounded-xl hover:bg-gray-100 transition-all text-gray-600">

            </button>
        </div>

        <div class="p-4 border-t border-gray-100 space-y-1 relative" id="profileSection">
            <!-- Profile Section (Hidden for guests) -->
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0 h-full relative">
        <header class="h-[var(--header-h)] flex items-center justify-between px-6 border-b border-gray-50 bg-white/80 backdrop-blur-md shrink-0">
            <div class="flex items-center gap-4">
                <button id="sidebarToggle" class="flex flex-col gap-1.5 p-1 md:hidden">
                    <span class="w-6 h-0.5 bg-gray-600 rounded-full"></span>
                    <span class="w-4 h-0.5 bg-gray-600 rounded-full"></span>
                </button>
            </div>
            <div id="authButtons">

            </div>
        </header>

        <div id="chatWindow" class="flex-1 overflow-y-auto hide-scrollbar scroll-smooth">
            <div id="emptyView" class="min-h-full flex flex-col items-center justify-center text-center p-12 opacity-30 select-none">
                <img src="https://i.postimg.cc/TYd6FZy0/grok-image-x6em5fj-edit-96291120058942.png" class="w-20 h-20 mb-4 grayscale" alt="Logo">
                <h2 class="text-2xl font-bold">Afnan ai</h2>
            </div>
            <div id="messageBox" class="max-w-3xl mx-auto p-4 md:p-8 space-y-10"></div>
        </div>

        <div class="w-full bg-white p-4 md:p-8 pt-2 shrink-0 safe-pb">
            <div class="max-w-3xl mx-auto relative">
                <!-- Guest Warning (Hidden as requested) -->
                <div id="guestWarning" class="guest-warning">
                    ⚠️ أنت تستخدم النسخة المجانية. بعد رسالة واحدة، يجب عليك تسجيل الدخول للمتابعة أو الانتظار 4 ساعات.
                </div>

                <div class="chat-input-container bg-[#F4F4F4] rounded-[2.2rem] p-1.5 flex items-end gap-1.5 focus-within:bg-white shadow-sm transition-all relative">
                    <!-- Attachment Menu -->
                    <div id="attachMenu" class="glass p-3 space-y-2">
                        <div id="pickImage" class="p-2 hover:bg-gray-100 rounded-lg cursor-pointer flex items-center gap-3"><i class="fa-solid fa-image"></i> <span>صورة</span></div>
                        <div id="pickFile" class="p-2 hover:bg-gray-100 rounded-lg cursor-pointer flex items-center gap-3"><i class="fa-solid fa-file"></i> <span>ملف</span></div>
                    </div>
                    
                    <button id="attachBtn" class="w-12 h-12 flex items-center justify-center rounded-full text-gray-400"><i class="fa-solid fa-plus text-xl"></i></button>
                    <input type="file" id="imageInput" accept="image/*" class="hidden">
                    <input type="file" id="fileInput" class="hidden">
                    <textarea id="chatInput" rows="1" placeholder="اسأل Afnan ai..." class="flex-1 bg-transparent border-none focus:ring-0 py-3 px-2 text-[16px] resize-none max-h-40 hide-scrollbar" dir="auto"></textarea>
                    <button id="sendBtn" class="w-11 h-11 bg-black text-white rounded-full flex items-center justify-center disabled:opacity-50"><i class="fa-solid fa-arrow-up"></i></button>
                </div>
            </div>
        </div>
    </main>

    <!-- Logout Confirmation Modal -->
    <div id="logoutConfirm" class="flex">
        <div class="glass p-8 rounded-3xl text-center max-w-xs w-full mx-4 shadow-2xl">
            <h3 class="text-xl font-bold mb-6">هل أنت متأكد من تسجيل الخروج؟</h3>
            <div class="flex gap-4">
                <button id="confirmYes" class="flex-1 bg-black text-white py-3 rounded-2xl font-bold">نعم</button>
                <button id="confirmNo" class="flex-1 bg-gray-100 text-gray-800 py-3 rounded-2xl font-bold">لا</button>
            </div>
        </div>

    <!-- Firebase & Firestore Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, doc, setDoc, updateDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC89TjMlrtfh88o_HDgCHD42hAvXMZ6fQM",
            authDomain: "afnan-49d21.firebaseapp.com",
            projectId: "afnan-49d21",
            storageBucket: "afnan-49d21.firebasestorage.app",
            messagingSenderId: "886430112619",
            appId: "1:886430112619:web:278b9ea777f4dda77b0a2e",
            measurementId: "G-EWMJ8ZPY7X"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const analytics = getAnalytics(app);

        let currentUser = null;
        let currentChatId = null;
        let guestMessageCount = 0;
        let guestLastMessageTime = null;
        let guestBlocked = false;

        // Generate 24-character ID
        const generateId = () => {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let id = '';
            for (let i = 0; i < 24; i++) {
                id += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return id;
        };

        // Get or create guest session ID
        const getGuestSessionId = () => {
            let sessionId = sessionStorage.getItem('guestSessionId');
            if (!sessionId) {
                sessionId = generateId();
                sessionStorage.setItem('guestSessionId', sessionId);
            }
            return sessionId;
        };

        // Check authentication
        onAuthStateChanged(auth, async (user) => {
            const loginBtnHeader = document.getElementById('loginBtnHeader');
            const profileSection = document.getElementById('profileSection');
            const guestWarning = document.getElementById('guestWarning');

            if (!user) {
                currentUser = null;
                guestMessageCount = 0;
                guestLastMessageTime = null;
                guestBlocked = false;
                
                if (loginBtnHeader) loginBtnHeader.style.display = 'block';
                profileSection.innerHTML = '';
                guestWarning.style.display = 'none'; // تم إخفاؤها برمجياً أيضاً
                dom.historyList.innerHTML = '';
            } else {
                currentUser = user;
                if (loginBtnHeader) loginBtnHeader.style.display = 'none';
                guestWarning.style.display = 'none';
                
                // Create profile section for logged-in users
                profileSection.innerHTML = `
                    <div id="profileTrigger" class="flex items-center gap-3 p-2.5 rounded-2xl cursor-pointer hover:bg-gray-200/50 transition-all">
                        <img id="profileImg" src="${user.photoURL || 'https://via.placeholder.com/40'}" alt="Profile" class="w-10 h-10 rounded-full bg-black text-white flex items-center justify-center font-bold text-sm object-cover">
                        <div class="flex-1 min-w-0">
                            <p id="profileName" class="text-xs font-bold truncate">${user.displayName || 'User'}</p>
                            <p id="profileEmail" class="text-xs text-gray-500 truncate">${user.email || 'email@example.com'}</p>
                        </div>
                        <i class="fa-solid fa-ellipsis-vertical text-gray-300 text-xs"></i>
                    </div>

                    <div id="profilePopup" class="glass p-2 space-y-1">
                        <a href="javascript:navigateToPage('Mahmoud.html')" class="block p-3 text-sm hover:bg-gray-100 rounded-xl transition-all">سياسة الخصوصية</a>
                        <a href="javascript:navigateToPage('Mahmoud2.html')" class="block p-3 text-sm hover:bg-gray-100 rounded-xl transition-all">اتفاقية المستخدم</a>
                        <button id="logoutBtn" class="w-full text-right p-3 text-sm hover:bg-gray-100 rounded-xl transition-all">تسجيل الخروج</button>
                        <button id="deleteAccountBtn" class="w-full text-right p-3 text-sm text-red-500 hover:bg-red-50 rounded-xl transition-all">حذف الحساب</button>
                    </div>
                `;

                // Re-attach event listeners for profile
                setupProfileListeners();
                
                // Load chat history
                await loadChatHistory();
            }
        });

        const setupProfileListeners = () => {
            const profileTrigger = document.getElementById('profileTrigger');
            const profilePopup = document.getElementById('profilePopup');
            const logoutBtn = document.getElementById('logoutBtn');
            const deleteAccountBtn = document.getElementById('deleteAccountBtn');

            if (profileTrigger) {
                profileTrigger.onclick = (e) => {
                    e.stopPropagation();
                    profilePopup.style.display = profilePopup.style.display === 'block' ? 'none' : 'block';
                };
            }

            if (logoutBtn) {
                logoutBtn.onclick = () => dom.logoutConfirm.style.display = 'flex';
            }

            if (deleteAccountBtn) {
                deleteAccountBtn.onclick = async () => {
                    if (currentUser) {
                        const verificationCode = Math.floor(Math.random() * 10000000).toString().padStart(7, '0');
                        
                        try {
                            await setDoc(doc(db, 'deleteRequests', currentUser.uid), {
                                email: currentUser.email,
                                code: verificationCode,
                                createdAt: new Date(),
                                expiresAt: new Date(Date.now() + 15 * 60 * 1000)
                            });

                            const response = await fetch('https://api-puce-iota-11.vercel.app/send-verification-email', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    email: currentUser.email,
                                    code: verificationCode,
                                    name: currentUser.displayName || 'User'
                                })
                            });

                            if (response.ok) {
                                localStorage.setItem('deleteRequestEmail', currentUser.email);
                                navigateToPage('Mahmoud3.html');
                            } else {
                                alert('خطأ في إرسال رمز التحقق. حاول مرة أخرى.');
                            }
                        } catch (error) {
                            console.error('Error:', error);
                            alert('خطأ: ' + error.message);
                        }
                    }
                };
            }
        };

        document.addEventListener('click', (e) => {
            if (e.target && e.target.id === 'loginBtnHeader') {
                navigateToPage('login.html');
            }
        });

        const dom = {
            sidebar: document.getElementById('sidebar'),
            overlay: document.getElementById('overlay'),
            chatInput: document.getElementById('chatInput'),
            sendBtn: document.getElementById('sendBtn'),
            chatWindow: document.getElementById('chatWindow'),
            messageBox: document.getElementById('messageBox'),
            emptyView: document.getElementById('emptyView'),
            logoutConfirm: document.getElementById('logoutConfirm'),
            confirmYes: document.getElementById('confirmYes'),
            confirmNo: document.getElementById('confirmNo'),
            attachBtn: document.getElementById('attachBtn'),
            attachMenu: document.getElementById('attachMenu'),
            newChatBtn: document.getElementById('newChatBtn'),
            historyList: document.getElementById('historyList')
        };

        const toggleSidebar = (val) => {
            const isVisible = val !== undefined ? val : dom.sidebar.classList.contains('-translate-x-full');
            dom.sidebar.classList.toggle('-translate-x-full', !isVisible);
            dom.overlay.classList.toggle('hidden', !isVisible);
            requestAnimationFrame(() => dom.overlay.style.opacity = isVisible ? '1' : '0');
        };

        document.getElementById('sidebarToggle').onclick = () => toggleSidebar();
        dom.overlay.onclick = () => toggleSidebar(false);

        // Attach Menu Toggle
        dom.attachBtn.onclick = (e) => {
            e.stopPropagation();
            dom.attachMenu.style.display = dom.attachMenu.style.display === 'block' ? 'none' : 'block';
        };

        // File Picking Logic
        const imageInput = document.getElementById('imageInput');
        const fileInput = document.getElementById('fileInput');
        document.getElementById('pickImage').onclick = () => imageInput.click();
        document.getElementById('pickFile').onclick = () => fileInput.click();

        imageInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const userMsg = document.createElement('div');
                    userMsg.className = 'flex justify-end animate-msg';
                    userMsg.innerHTML = `
                        <div class="bg-[#F4F4F4] px-5 py-3.5 rounded-[1.8rem] rounded-tr-md max-w-[85%] text-gray-800 text-[15px]">
                            <img src="${event.target.result}" alt="صورة مرفقة" class="image-preview">
                            <p class="mt-2 text-sm">${file.name}</p>
                        </div>
                    `;
                    dom.messageBox.appendChild(userMsg);
                    dom.attachMenu.style.display = 'none';
                    dom.chatWindow.scrollTop = dom.chatWindow.scrollHeight;
                };
                reader.readAsDataURL(file);
            }
        };

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const userMsg = document.createElement('div');
                userMsg.className = 'flex justify-end animate-msg';
                userMsg.innerHTML = `<div class="bg-[#F4F4F4] px-5 py-3.5 rounded-[1.8rem] rounded-tr-md max-w-[85%] text-gray-800 text-[15px]"><i class="fa-solid fa-file"></i> ${file.name}</div>`;
                dom.messageBox.appendChild(userMsg);
                dom.attachMenu.style.display = 'none';
                dom.chatWindow.scrollTop = dom.chatWindow.scrollHeight;
            }
        };

        // Close popups on click outside
        window.onclick = () => {
            const profilePopup = document.getElementById('profilePopup');
            if (profilePopup) profilePopup.style.display = 'none';
            dom.attachMenu.style.display = 'none';
        };

        // Logout Flow
        dom.confirmNo.onclick = () => dom.logoutConfirm.style.display = 'none';
        dom.confirmYes.onclick = async () => {
            await signOut(auth);
            navigateToPage('index.html');
        };

        // New Chat
        dom.newChatBtn.onclick = () => {
            dom.messageBox.innerHTML = '';
            dom.emptyView.style.display = 'flex';
            dom.chatInput.value = '';
            currentChatId = null;
            guestMessageCount = 0;
            if(window.innerWidth < 768) toggleSidebar(false);
        };

        // Load Chat History
        const loadChatHistory = async () => {
            if (!currentUser) return;
            
            try {
                // فرز المحادثات: المثبتة أولاً، ثم حسب تاريخ التحديث
                const q = query(collection(db, 'chats'), where('userId', '==', currentUser.uid), orderBy('isPinned', 'desc'), orderBy('updatedAt', 'desc'));
                const querySnapshot = await getDocs(q);
                
                dom.historyList.innerHTML = '';
                
                querySnapshot.forEach((docSnap) => {
                    const chat = docSnap.data();
                    const chatId = docSnap.id;
                    const chatItem = document.createElement('div');
                    chatItem.className = `group flex items-center justify-between p-3 rounded-xl hover:bg-gray-100 transition-all cursor-pointer text-sm text-gray-700 ${chat.isPinned ? 'bg-gray-50 border-r-4 border-black' : ''}`;
                    
                    // الحصول على أول 3 كلمات من أول رسالة
                    let previewText = chat.title || 'محادثة جديدة';
                    if (chat.messages && chat.messages.length > 0) {
                        const firstMsg = chat.messages[0].text || "";
                        previewText = firstMsg.split(' ').slice(0, 3).join(' ') + (firstMsg.split(' ').length > 3 ? '...' : '');
                    }

                    chatItem.innerHTML = `
                        <div class="flex-1 min-w-0" onclick="loadChat('${chatId}', ${JSON.stringify(chat).replace(/"/g, '&quot;')})">
                            <p class="truncate font-medium">${previewText}</p>
                        </div>
                        <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-all">
                            <i class="fa-solid fa-thumbtack text-[10px] ${chat.isPinned ? 'text-black opacity-100' : 'text-gray-300'}" onclick="event.stopPropagation(); togglePin('${chatId}', ${chat.isPinned})"></i>
                            <i class="fa-solid fa-pen text-[10px] text-gray-300 hover:text-blue-500" onclick="event.stopPropagation(); editChatTitle('${chatId}', '${previewText.replace(/'/g, "\\'")}')"></i>
                            <i class="fa-solid fa-trash text-[10px] text-gray-300 hover:text-red-500" onclick="event.stopPropagation(); deleteChat('${chatId}')"></i>
                        </div>
                    `;
                    dom.historyList.appendChild(chatItem);
                });
            } catch (error) {
                console.error('Error loading chat history:', error);
            }
        };

        // Edit Chat Title
        window.editChatTitle = async (chatId, currentTitle) => {
            const newTitle = prompt("أدخل الاسم الجديد للمحادثة:", currentTitle);
            if (newTitle && newTitle.trim() !== "") {
                try {
                    await updateDoc(doc(db, 'chats', chatId), { title: newTitle.trim(), updatedAt: new Date() });
                    await loadChatHistory();
                } catch (e) { console.error(e); }
            }
        };

        // Delete Chat
        window.deleteChat = async (chatId) => {
            if (confirm("هل أنت متأكد من حذف هذه المحادثة؟")) {
                try {
                    // في Firestore لا يوجد حذف مباشر لمستند بسهولة إذا كان يحتوي على حقول معقدة، لكن سنستخدم deleteDoc
                    const { deleteDoc } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");
                    await deleteDoc(doc(db, 'chats', chatId));
                    if (currentChatId === chatId) {
                        dom.newChatBtn.click();
                    }
                    await loadChatHistory();
                    toast("تم حذف المحادثة");
                } catch (e) { console.error(e); }
            }
        };

        // Toggle Pin Function
        window.togglePin = async (chatId, currentStatus) => {
            try {
                const chatRef = doc(db, 'chats', chatId);
                await updateDoc(chatRef, { isPinned: !currentStatus, updatedAt: new Date() });
                await loadChatHistory();
            } catch (e) { console.error(e); }
        };

        // Load specific chat
        window.loadChat = (chatId, chatData) => {
            currentChatId = chatId;
            dom.messageBox.innerHTML = '';
            dom.emptyView.style.display = 'none';
            
            if (chatData.messages && Array.isArray(chatData.messages)) {
                chatData.messages.forEach(msg => {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'} animate-msg`;
                    
                    let msgContent = msg.text;
                    if (msg.imageUrl) {
                        msgContent = `<img src="${msg.imageUrl}" alt="صورة" class="image-preview"><p class="mt-2">${msg.text}</p>`;
                    }
                    
                    msgDiv.innerHTML = `
                        <div class="${msg.sender === 'user' ? 'bg-[#F4F4F4]' : 'bg-white border border-gray-100'} px-5 py-3.5 rounded-[1.8rem] ${msg.sender === 'user' ? 'rounded-tr-md' : 'rounded-tl-md'} max-w-[85%] text-gray-800 text-[15px]">
                            ${msgContent}
                        </div>
                    `;
                    dom.messageBox.appendChild(msgDiv);
                });
            }
            dom.chatWindow.scrollTop = dom.chatWindow.scrollHeight;
            if(window.innerWidth < 768) toggleSidebar(false);
        };

        // Get AI Response
        const getAIResponse = async (userMessage) => {
            const responses = [
                'هذا رد تفاعلي من Afnan ai. كيف يمكنني مساعدتك أكثر؟',
                'شكراً على سؤالك! أنا هنا لمساعدتك في أي استفسار.',
                'هذا موضوع مثير للاهتمام. دعني أساعدك في الحصول على الإجابة.',
                'أفهم سؤالك. دعني أقدم لك أفضل إجابة ممكنة.',
                'رائع! أنا مستعد لمساعدتك في هذا الموضوع.'
            ];
            
            return responses[Math.floor(Math.random() * responses.length)];
        };

        // Send Message
        const handleSend = async () => {
            const val = dom.chatInput.value.trim();
            if(!val) return;

            // Check guest restrictions
            if (!currentUser) {
                guestMessageCount++;
                guestLastMessageTime = Date.now();

                if (guestMessageCount > 1) {
                    guestBlocked = true;
                    dom.chatInput.disabled = true;
                    dom.sendBtn.disabled = true;
                    
                    const warningMsg = document.createElement('div');
                    warningMsg.className = 'flex justify-center animate-msg';
                    warningMsg.innerHTML = `
                        <div class="bg-yellow-50 border border-yellow-200 px-5 py-3.5 rounded-[1.8rem] max-w-[85%] text-yellow-800 text-[15px] text-center">
                            <p class="font-bold mb-2">⏱️ انتظر 4 ساعات أو سجل الدخول</p>
                            <p class="text-sm">لقد وصلت إلى حد الرسائل المجانية. يمكنك تسجيل الدخول للمتابعة أو الانتظار 4 ساعات.</p>
                        </div>
                    `;
                    dom.messageBox.appendChild(warningMsg);
                    dom.chatWindow.scrollTop = dom.chatWindow.scrollHeight;
                    return;
                }
            }
            
            dom.emptyView.style.display = 'none';
            
            // User Message
            const userMsg = document.createElement('div');
            userMsg.className = 'flex justify-end animate-msg';
            userMsg.innerHTML = `<div class="bg-[#F4F4F4] px-5 py-3.5 rounded-[1.8rem] rounded-tr-md max-w-[85%] text-gray-800 text-[15px]">${val}</div>`;
            dom.messageBox.appendChild(userMsg);
            
            const userMessageText = val;
            dom.chatInput.value = '';
            dom.chatWindow.scrollTop = dom.chatWindow.scrollHeight;

            // Typing Indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = 'flex items-start gap-3 animate-msg';
            typingDiv.innerHTML = `
                <img src="https://i.postimg.cc/TYd6FZy0/grok-image-x6em5fj-edit-96291120058942.png" class="w-6 h-6 mt-1">
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            dom.messageBox.appendChild(typingDiv);
            dom.chatWindow.scrollTop = dom.chatWindow.scrollHeight;

            // Get AI Response
            setTimeout(async () => {
                const aiResponse = await getAIResponse(userMessageText);
                typingDiv.remove();

                const botMsg = document.createElement('div');
                botMsg.className = 'flex flex-col gap-2 animate-msg';
                botMsg.innerHTML = `
                    <div class="flex items-start gap-3">
                        <img src="https://i.postimg.cc/TYd6FZy0/grok-image-x6em5fj-edit-96291120058942.png" class="w-6 h-6 mt-1">
                        <div class="bg-white border border-gray-100 px-5 py-3.5 rounded-[1.8rem] rounded-tl-md max-w-[85%] text-gray-800 text-[15px]">
                            ${aiResponse}
                            <div class="flex gap-4 mt-4 text-xs border-t pt-3">
                                <i class="fa-regular fa-copy action-icon" title="نسخ" onclick="navigator.clipboard.writeText('${aiResponse.replace(/'/g, "\\'")}'); toast('تم النسخ')"></i>
                                <i class="fa-solid fa-share-nodes action-icon" title="مشاركة" onclick="showShareModal()"></i>
                                <i class="fa-regular fa-thumbs-up action-icon" title="إعجاب" onclick="toast('تم الإعجاب')"></i>
                                <i class="fa-regular fa-thumbs-down action-icon" title="لم يعجبني" onclick="toast('لم يتم الإعجاب')"></i>
                                <i class="fa-solid fa-rotate-right action-icon" title="إعادة المحاولة" onclick="retryMessage('${userMessageText.replace(/'/g, "\\'")}')"></i>
                            </div>
                        </div>
                    </div>
                `;
                dom.messageBox.appendChild(botMsg);
                dom.chatWindow.scrollTop = dom.chatWindow.scrollHeight;

                // Save to Firestore
                try {
                    if (currentUser) {
                        if (!currentChatId) {
                            const chatRef = await addDoc(collection(db, 'chats'), {
                                userId: currentUser.uid,
                                title: userMessageText.split(' ').slice(0, 3).join(' '),
                                messages: [
                                    { sender: 'user', text: userMessageText, timestamp: new Date() },
                                    { sender: 'bot', text: aiResponse, timestamp: new Date() }
                                ],
                                createdAt: new Date(),
                                updatedAt: new Date(),
                                isPinned: false
                            });
                            currentChatId = chatRef.id;
                        } else {
                            const chatRef = doc(db, 'chats', currentChatId);
                            // استخدام arrayUnion لتجنب قراءة الرسائل القديمة في كل مرة
                            const { arrayUnion } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");
                            await updateDoc(chatRef, {
                                messages: arrayUnion(
                                    { sender: 'user', text: userMessageText, timestamp: new Date() },
                                    { sender: 'bot', text: aiResponse, timestamp: new Date() }
                                ),
                                updatedAt: new Date()
                            });
                        }
                        await loadChatHistory();
                    }
                } catch (error) {
                    console.error('Error saving chat:', error);
                }
            }, 1000);
        };

        window.toast = (msg) => {
            const t = document.createElement('div');
            t.className = 'fixed bottom-24 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-2.5 rounded-full text-sm z-[2000] animate-msg shadow-lg';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        };

        window.retryMessage = (text) => {
            dom.chatInput.value = text;
            handleSend();
        };

        window.showShareModal = () => {
            const isPublic = confirm("هل تريد مشاركة المحادثة بشكل عام؟\n(موافق = عام، إلغاء = خاص)");
            const type = isPublic ? "عامة" : "خاصة";
            const randomID = generateId();
            const shareURL = `${window.location.origin}${window.location.pathname}?share=${randomID}`;
            
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-[3000] p-4';
            modal.innerHTML = `
                <div class="glass p-8 rounded-3xl max-w-sm w-full text-center space-y-4 shadow-2xl">
                    <h3 class="text-xl font-bold">رابط مشاركة ${type}</h3>
                    <p class="text-sm text-gray-500 break-all bg-gray-100 p-3 rounded-xl">${shareURL}</p>
                    <div class="flex gap-3">
                        <button onclick="navigator.clipboard.writeText('${shareURL}'); toast('تم نسخ الرابط'); this.parentElement.parentElement.parentElement.remove()" class="flex-1 bg-black text-white py-3 rounded-2xl font-bold">نسخ الرابط</button>
                        <button onclick="this.parentElement.parentElement.parentElement.remove()" class="flex-1 bg-gray-100 py-3 rounded-2xl font-bold">إغلاق</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        };

        dom.sendBtn.onclick = handleSend;
        dom.chatInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };
    </script>
</body>
</html>
