<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Afnan ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="security.js"></script>
    
    <style>
        :root { --header-h: 60px; }
        html, body { height: var(--app-height); width: 100%; margin: 0; padding: 0; overflow: auto; overscroll-behavior: contain; background-color: white; -webkit-tap-highlight-color: transparent; font-family: system-ui, -apple-system, sans-serif; }
        @supports (-webkit-touch-callout: none) {
            body {
                height: -webkit-fill-available;
            }
        }
        body { display: flex; flex-direction: row; }
        .hide-scrollbar::-webkit-scrollbar { width: 0px; height: 0px; }
        .hide-scrollbar { scrollbar-width: none; }
        .sidebar-transition { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); will-change: transform; }
        #overlay { z-index: 100; }
        #sidebar { z-index: 150; }
        header { 
            z-index: 50;
            position: relative;
            width: 100%;
            height: var(--header-h);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transform: translateZ(0);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        #chatWindow {
            padding-top: 10px;
            margin-top: 0;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-msg { animation: slideUp 0.3s ease-out forwards; }
        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
        
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        #profilePopup {
            display: none;
            position: absolute;
            bottom: 70px;
            left: 10px;
            width: 220px;
            z-index: 200;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        #logoutConfirm {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }
        
        #attachMenu {
            display: none;
            position: absolute;
            bottom: 70px;
            right: 0;
            width: 200px;
            z-index: 60;
            border-radius: 1.2rem;
        }

        .action-icon {
            cursor: pointer;
            transition: color 0.2s;
            color: #9ca3af;
        }
        .action-icon:hover { color: #3b82f6; }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #9ca3af;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.5; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-10px); }
        }

        .chat-input-container {
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            -webkit-tap-highlight-color: transparent;
        }

        textarea#chatInput {
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            -webkit-appearance: none;
            background: transparent !important;
        }
        
        input:focus, textarea:focus, select:focus, button:focus {
            outline: none !important;
            box-shadow: none !important;
        }

        .image-preview {
            max-width: 300px;
            max-height: 300px;
            border-radius: 1rem;
            object-fit: cover;
            margin-top: 8px;
        }

        /* Attachment Preview Area */
        #attachmentPreview {
            display: none;
            padding: 10px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            width: 100%;
        }
        .preview-item {
            position: relative;
            display: inline-block;
            width: 80px;
            height: 80px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #eee;
        }
        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .preview-item .remove-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0,0,0,0.6);
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
        }
        .file-preview-icon {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f9f9f9;
            font-size: 24px;
            color: #666;
        }
        .file-preview-name {
            font-size: 8px;
            padding: 2px;
            text-align: center;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
    <script>
        function setAppHeight() {
            document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
        }
        window.addEventListener('resize', setAppHeight);
        setAppHeight();

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                const header = document.querySelector('header');
                if (header) header.style.top = window.visualViewport.offsetTop + 'px';
            });
            window.visualViewport.addEventListener('scroll', () => {
                const header = document.querySelector('header');
                if (header) header.style.top = window.visualViewport.offsetTop + 'px';
            });
        }

        let startY = 0;
        let pulling = false;
        document.addEventListener("DOMContentLoaded", () => {
            const indicator = document.getElementById("pullRefresh");
            window.addEventListener("touchstart", (e) => {
                if (window.scrollY === 0) {
                    startY = e.touches[0].clientY;
                    pulling = true;
                }
            });
            window.addEventListener("touchmove", (e) => {
                if (!pulling) return;
                let diff = e.touches[0].clientY - startY;
                if (diff > 0) indicator.style.top = Math.min(diff - 50, 20) + "px";
                indicator.innerText = diff > 120 ? "↻ سيتم التحديث..." : "⟳ اسحب للتحديث";
            });
            window.addEventListener("touchend", (e) => {
                if (!pulling) return;
                let diff = e.changedTouches[0].clientY - startY;
                indicator.style.top = "-50px";
                pulling = false;
                if (diff > 120) location.reload();
            });
        });
    </script>
</head>
<body class="antialiased text-gray-900">

    <div id="pullRefresh" style="position: fixed; top: -50px; left: 0; right: 0; text-align: center; transition: 0.3s; font-size: 14px; color: gray; z-index: 1000;">
        ⟳ اسحب للتحديث
    </div>

    <div id="overlay" class="fixed inset-0 bg-black/20 backdrop-blur-[2px] hidden transition-opacity duration-300 opacity-0"></div>

    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 w-72 bg-[#fcfcfc] border-r border-gray-100 flex flex-col transform -translate-x-full md:translate-x-0 sidebar-transition h-full shadow-lg md:shadow-none">
        <div class="p-4 flex flex-col gap-4">
            <button id="newChatBtn" class="flex items-center gap-3 w-full bg-white border border-gray-200 p-3.5 rounded-2xl hover:bg-gray-50 transition-all shadow-sm">
                <img src="https://i.postimg.cc/TYd6FZy0/grok-image-x6em5fj-edit-96291120058942.png" alt="Logo" class="w-5 h-5">
                <span class="font-bold text-gray-700 text-sm">محادثة جديدة</span>
            </button>
        </div>
        
        <div class="flex-1 overflow-y-auto px-4 space-y-2 hide-scrollbar" id="historyList">
            </div>

        <div class="p-4 border-t border-gray-100 space-y-1">
            <a href="https://service.afnanai.com" target="_blank" class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-100 transition-all text-gray-600">
                <i class="fa-solid fa-headset"></i>
                <span class="text-sm font-medium">خدمة العملاء</span>
            </a>
            <button onclick="showShareModal()" class="flex items-center gap-3 w-full p-3 rounded-xl hover:bg-gray-100 transition-all text-gray-600">
                <i class="fa-solid fa-share-nodes"></i>
                <span class="text-sm font-medium">إدارة الروابط</span>
            </button>
        </div>

        <div class="p-4 border-t border-gray-100 space-y-1 relative" id="profileSection"></div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 h-full relative">
        <header class="h-[var(--header-h)] flex items-center justify-between px-6 border-b border-gray-50 bg-white/80 backdrop-blur-md shrink-0">
            <div class="flex items-center gap-4">
                <button id="sidebarToggle" class="flex flex-col gap-1.5 p-1 md:hidden">
                    <span class="w-6 h-0.5 bg-gray-600 rounded-full"></span>
                    <span class="w-4 h-0.5 bg-gray-600 rounded-full"></span>
                </button>
            </div>
            <div id="authButtons">
                <button id="loginBtnHeader" onclick="navigateToPage('login.html')" class="bg-black text-white px-6 py-2 rounded-full text-sm font-bold hover:bg-gray-800 transition-all">تسجيل الدخول</button>
            </div>
        </header>

        <div id="chatWindow" class="flex-1 overflow-y-auto hide-scrollbar scroll-smooth">
            <div id="emptyView" class="min-h-full flex flex-col items-center justify-center text-center p-12 opacity-30 select-none">
                <img src="https://i.postimg.cc/TYd6FZy0/grok-image-x6em5fj-edit-96291120058942.png" class="w-20 h-20 mb-4 grayscale" alt="Logo">
                <h2 class="text-2xl font-bold">Afnan ai</h2>
            </div>
            <div id="messageBox" class="max-w-3xl mx-auto p-4 md:p-8 space-y-10"></div>
        </div>

        <div class="w-full bg-white p-4 md:p-8 pt-2 shrink-0 safe-pb">
            <div class="max-w-3xl mx-auto relative">
                <div class="chat-input-container bg-[#F4F4F4] rounded-[2.2rem] flex flex-col shadow-sm transition-all relative overflow-hidden">
                    <div id="attachmentPreview"></div>

                    <div class="flex items-end gap-1.5 p-1.5 focus-within:bg-white">
                        <div id="attachMenu" class="glass p-3 space-y-2">
                            <div id="pickImage" class="p-2 hover:bg-gray-100 rounded-lg cursor-pointer flex items-center gap-3"><i class="fa-solid fa-image text-gray-500"></i> <span class="text-sm font-medium">صورة</span></div>
                            <div id="pickFile" class="p-2 hover:bg-gray-100 rounded-lg cursor-pointer flex items-center gap-3"><i class="fa-solid fa-file text-gray-500"></i> <span class="text-sm font-medium">ملف</span></div>
                            <div id="pickBanana" class="p-2 hover:bg-gray-100 rounded-lg cursor-pointer flex items-center gap-3"><span class="text-xl">🍌</span> <span class="text-sm font-medium text-yellow-600">توليد صور</span></div>
                        </div>
                        
                        <button id="attachBtn" class="w-12 h-12 flex items-center justify-center rounded-full text-gray-400 hover:bg-gray-200 transition-colors"><i class="fa-solid fa-plus text-xl"></i></button>
                        
                        <div id="activeBananaBtn" style="display: none;" class="relative w-12 h-12 flex items-center justify-center rounded-full bg-yellow-100 text-2xl cursor-pointer">
                            🍌
                            <span id="removeBananaBtn" class="absolute top-0 right-0 bg-gray-800 hover:bg-red-500 text-white rounded-full w-4 h-4 flex items-center justify-center text-[10px] cursor-pointer transition-colors">&times;</span>
                        </div>

                        <input type="file" id="imageInput" accept="image/*" class="hidden">
                        <input type="file" id="fileInput" class="hidden">
                        <textarea id="chatInput" rows="1" placeholder="اسأل Afnan ai..." class="flex-1 bg-transparent border-none focus:ring-0 py-3 px-2 text-[16px] resize-none max-h-40 hide-scrollbar" dir="auto"></textarea>
                        <button id="sendBtn" class="w-11 h-11 bg-black text-white rounded-full flex items-center justify-center disabled:opacity-50 hover:bg-gray-800 transition-colors"><i class="fa-solid fa-arrow-up"></i></button>

    <div id="logoutConfirm" class="flex">
        <div class="glass p-8 rounded-3xl text-center max-w-xs w-full mx-4 shadow-2xl">
            <h3 class="text-xl font-bold mb-6">هل أنت متأكد من تسجيل الخروج؟</h3>
            <div class="flex gap-4">
                <button id="confirmYes" class="flex-1 bg-black text-white py-3 rounded-2xl font-bold">نعم</button>
                <button id="confirmNo" class="flex-1 bg-gray-100 text-gray-800 py-3 rounded-2xl font-bold">لا</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, doc, setDoc, updateDoc, orderBy, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // دالة التنقل العامة لتعمل مع HTML مباشرة
        window.navigateToPage = (url) => { window.location.href = url; };
        // متغير عالمي لمعرفة هل نحن في وضع توليد الصور أم لا
        window.isBananaMode = false;

        const firebaseConfig = {
            apiKey: "AIzaSyC89TjMlrtfh88o_HDgCHD42hAvXMZ6fQM",
            authDomain: "afnan-49d21.firebaseapp.com",
            projectId: "afnan-49d21",
            storageBucket: "afnan-49d21.firebasestorage.app",
            messagingSenderId: "886430112619",
            appId: "1:886430112619:web:278b9ea777f4dda77b0a2e",
            measurementId: "G-EWMJ8ZPY7X"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let currentChatId = null;
        let pendingAttachment = null;

        const dom = {
            sidebar: document.getElementById('sidebar'),
            overlay: document.getElementById('overlay'),
            chatInput: document.getElementById('chatInput'),
            sendBtn: document.getElementById('sendBtn'),
            chatWindow: document.getElementById('chatWindow'),
            messageBox: document.getElementById('messageBox'),
            emptyView: document.getElementById('emptyView'),
            logoutConfirm: document.getElementById('logoutConfirm'),
            confirmYes: document.getElementById('confirmYes'),
            confirmNo: document.getElementById('confirmNo'),
            attachBtn: document.getElementById('attachBtn'),
            attachMenu: document.getElementById('attachMenu'),
            newChatBtn: document.getElementById('newChatBtn'),
            historyList: document.getElementById('historyList'),
            attachmentPreview: document.getElementById('attachmentPreview'),
            activeBananaBtn: document.getElementById('activeBananaBtn'),
            removeBananaBtn: document.getElementById('removeBananaBtn'),
            pickBanana: document.getElementById('pickBanana')
        };

        onAuthStateChanged(auth, async (user) => {
            const loginBtnHeader = document.getElementById('loginBtnHeader');
            const profileSection = document.getElementById('profileSection');

            if (!user) {
                currentUser = null;
                if (loginBtnHeader) loginBtnHeader.style.display = 'block';
                profileSection.innerHTML = '';
                dom.historyList.innerHTML = '';
            } else {
                currentUser = user;
                if (loginBtnHeader) loginBtnHeader.style.display = 'none';
                profileSection.innerHTML = `
                    <div id="profileTrigger" class="flex items-center gap-3 p-2.5 rounded-2xl cursor-pointer hover:bg-gray-200/50 transition-all">
                        <img id="profileImg" src="${user.photoURL || 'https://via.placeholder.com/40'}" alt="Profile" class="w-10 h-10 rounded-full bg-black text-white flex items-center justify-center font-bold text-sm object-cover">
                        <div class="flex-1 min-w-0">
                            <p id="profileName" class="text-xs font-bold truncate">${user.displayName || 'User'}</p>
                            <p id="profileEmail" class="text-xs text-gray-500 truncate">${user.email || ''}</p>
                        </div>
                        <i class="fa-solid fa-ellipsis-vertical text-gray-300 text-xs"></i>
                    </div>
                    <div id="profilePopup" class="glass p-2 space-y-1">
                        <a href="javascript:navigateToPage('Mahmoud.html')" class="block p-3 text-sm hover:bg-gray-100 rounded-xl transition-all">سياسة الخصوصية</a>
                        <a href="javascript:navigateToPage('Mahmoud2.html')" class="block p-3 text-sm hover:bg-gray-100 rounded-xl transition-all">اتفاقية المستخدم</a>
                        <button id="logoutBtn" class="w-full text-right p-3 text-sm hover:bg-gray-100 rounded-xl transition-all">تسجيل الخروج</button>
                        <button id="deleteAccountBtn" class="w-full text-right p-3 text-sm text-red-500 hover:bg-red-50 rounded-xl transition-all">حذف الحساب</button>
                    </div>
                `;
                setupProfileListeners();
                await loadChatHistory();
            }
        });

        const setupProfileListeners = () => {
            const trigger = document.getElementById('profileTrigger');
            const popup = document.getElementById('profilePopup');
            if (trigger) trigger.onclick = (e) => { e.stopPropagation(); popup.style.display = popup.style.display === 'block' ? 'none' : 'block'; };
            document.getElementById('logoutBtn').onclick = () => dom.logoutConfirm.style.display = 'flex';
            document.getElementById('deleteAccountBtn').onclick = () => navigateToPage('Mahmoud3.html');
        };

        const toggleSidebar = (val) => {
            const isVisible = val !== undefined ? val : dom.sidebar.classList.contains('-translate-x-full');
            dom.sidebar.classList.toggle('-translate-x-full', !isVisible);
            dom.overlay.classList.toggle('hidden', !isVisible);
            requestAnimationFrame(() => dom.overlay.style.opacity = isVisible ? '1' : '0');
        };

        document.getElementById('sidebarToggle').onclick = () => toggleSidebar();
        dom.overlay.onclick = () => toggleSidebar(false);

        dom.attachBtn.onclick = (e) => {
            e.stopPropagation();
            dom.attachMenu.style.display = dom.attachMenu.style.display === 'block' ? 'none' : 'block';
        };

        // تفعيل نظام توليد الصور
        dom.pickBanana.onclick = (e) => {
            e.stopPropagation();
            window.isBananaMode = true;
            dom.attachBtn.style.display = 'none';
            dom.activeBananaBtn.style.display = 'flex';
            dom.attachMenu.style.display = 'none';
            dom.chatInput.placeholder = "صف الصورة التي تريد توليدها بالذكاء الاصطناعي...";
        };

        // إلغاء تفعيل نظام توليد الصور
        dom.removeBananaBtn.onclick = (e) => {
            e.stopPropagation();
            window.isBananaMode = false;
            dom.activeBananaBtn.style.display = 'none';
            dom.attachBtn.style.display = 'flex';
            dom.chatInput.placeholder = "اسأل Afnan ai...";
        };

        const imageInput = document.getElementById('imageInput');
        const fileInput = document.getElementById('fileInput');
        document.getElementById('pickImage').onclick = () => imageInput.click();
        document.getElementById('pickFile').onclick = () => fileInput.click();

        const showAttachmentPreview = (file, isImage) => {
            dom.attachmentPreview.innerHTML = '';
            dom.attachmentPreview.style.display = 'block';
            const reader = new FileReader();
            reader.onload = (e) => {
                pendingAttachment = { name: file.name, data: e.target.result, type: isImage ? 'image' : 'file' };
                const item = document.createElement('div');
                item.className = 'preview-item';
                if (isImage) {
                    item.innerHTML = `<img src="${e.target.result}"><div class="remove-btn" onclick="removeAttachment()">&times;</div>`;
                } else {
                    item.innerHTML = `<div class="file-preview-icon"><i class="fa-solid fa-file"></i><div class="file-preview-name">${file.name}</div></div><div class="remove-btn" onclick="removeAttachment()">&times;</div>`;
                }
                dom.attachmentPreview.appendChild(item);
            };
            reader.readAsDataURL(file);
            dom.attachMenu.style.display = 'none';
        };

        window.removeAttachment = () => {
            pendingAttachment = null;
            dom.attachmentPreview.innerHTML = '';
            dom.attachmentPreview.style.display = 'none';
            imageInput.value = '';
            fileInput.value = '';
        };

        imageInput.onchange = (e) => { if (e.target.files[0]) showAttachmentPreview(e.target.files[0], true); };
        fileInput.onchange = (e) => { if (e.target.files[0]) showAttachmentPreview(e.target.files[0], false); };

        window.onclick = () => {
            const popup = document.getElementById('profilePopup');
            if (popup) popup.style.display = 'none';
            dom.attachMenu.style.display = 'none';
        };

        dom.confirmNo.onclick = () => dom.logoutConfirm.style.display = 'none';
        dom.confirmYes.onclick = async () => { await signOut(auth); navigateToPage('index.html'); };

        dom.newChatBtn.onclick = () => {
            dom.messageBox.innerHTML = '';
            dom.emptyView.style.display = 'flex';
            dom.chatInput.value = '';
            currentChatId = null;
            removeAttachment();
            if(window.innerWidth < 768) toggleSidebar(false);
        };

        const loadChatHistory = async () => {
            if (!currentUser) return;
            try {
                const q = query(collection(db, 'chats'), where('userId', '==', currentUser.uid), orderBy('isPinned', 'desc'), orderBy('updatedAt', 'desc'));
                const snap = await getDocs(q);
                dom.historyList.innerHTML = '';
                snap.forEach((docSnap) => {
                    const chat = docSnap.data();
                    const chatId = docSnap.id;
                    const item = document.createElement('div');
                    item.className = `group flex items-center justify-between p-3 rounded-xl hover:bg-gray-100 transition-all cursor-pointer text-sm text-gray-700 ${chat.isPinned ? 'bg-gray-50 border-r-4 border-black' : ''}`;
                    
                    let preview = chat.title || 'محادثة جديدة';
                    if (chat.messages && chat.messages.length > 0) {
                        const first = chat.messages[0].text || "";
                        preview = first.split(' ').slice(0, 3).join(' ') + (first.split(' ').length > 3 ? '...' : '');
                    }

                    item.innerHTML = `
                        <div class="flex-1 min-w-0" onclick="loadChat('${chatId}')">
                            <p class="truncate font-medium">${preview}</p>
                        </div>
                        <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-all">
                            <i class="fa-solid fa-thumbtack text-[14px] ${chat.isPinned ? 'text-black opacity-100' : 'text-gray-400 hover:text-black'}" onclick="event.stopPropagation(); togglePin('${chatId}', ${chat.isPinned})"></i>
                            <i class="fa-solid fa-pen text-[12px] text-gray-400 hover:text-blue-500" onclick="event.stopPropagation(); editChatTitle('${chatId}', '${preview.replace(/'/g, "\\'")}')"></i>
                            <i class="fa-solid fa-trash text-[12px] text-gray-400 hover:text-red-500" onclick="event.stopPropagation(); deleteChat('${chatId}')"></i>
                        </div>
                    `;
                    dom.historyList.appendChild(item);
                });
            } catch (e) { console.error(e); }
        };

        window.loadChat = async (chatId) => {
            currentChatId = chatId;
            dom.messageBox.innerHTML = '';
            dom.emptyView.style.display = 'none';
            try {
                const snap = await getDocs(query(collection(db, 'chats'), where('__name__', '==', chatId)));
                if (!snap.empty) {
                    const chat = snap.docs[0].data();
                    chat.messages.forEach(msg => {
                        const div = document.createElement('div');
                        div.className = `flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'} animate-msg`;
                        let content = msg.text;
                        if (msg.attachment) {
                            if (msg.attachment.type === 'image') content = `<img src="${msg.attachment.data}" class="image-preview"><p class="mt-2">${msg.text}</p>`;
                            else content = `<div class="flex items-center gap-2"><i class="fa-solid fa-file"></i> ${msg.attachment.name}</div><p class="mt-2">${msg.text}</p>`;
                        }
                        // إضافة تنسيق مميز إذا كانت الرسالة طلب صورة
                        if(msg.isImageGenRequest) {
                            content = `🍌 <span class="text-yellow-600 font-bold ml-1">طلب صورة:</span> ` + content;
                        }
                        div.innerHTML = `<div class="${msg.sender === 'user' ? 'bg-[#F4F4F4]' : 'bg-white border border-gray-100'} px-5 py-3.5 rounded-[1.8rem] ${msg.sender === 'user' ? 'rounded-tr-md' : 'rounded-tl-md'} max-w-[85%] text-gray-800 text-[15px]">${content}</div>`;
                        dom.messageBox.appendChild(div);
                    });
                }
            } catch (e) { console.error(e); }
            dom.chatWindow.scrollTop = dom.chatWindow.scrollHeight;
            if(window.innerWidth < 768) toggleSidebar(false);
        };

        window.editChatTitle = async (chatId, current) => {
            const title = prompt("الاسم الجديد:", current);
            if (title) { await updateDoc(doc(db, 'chats', chatId), { title: title.trim(), updatedAt: new Date() }); await loadChatHistory(); }
        };

        window.deleteChat = async (chatId) => {
            if (confirm("حذف المحادثة؟")) { await deleteDoc(doc(db, 'chats', chatId)); if (currentChatId === chatId) dom.newChatBtn.click(); await loadChatHistory(); }
        };

        window.togglePin = async (chatId, status) => { await updateDoc(doc(db, 'chats', chatId), { isPinned: !status, updatedAt: new Date() }); await loadChatHistory(); };

        const handleSend = async () => {
            const val = dom.chatInput.value.trim();
            if (!val && !pendingAttachment) return;
            if (!currentUser) { navigateToPage('login.html'); return; }

            dom.emptyView.style.display = 'none';
            const userDiv = document.createElement('div');
            userDiv.className = 'flex justify-end animate-msg';
            let userContent = val;
            
            if (pendingAttachment) {
                if (pendingAttachment.type === 'image') userContent = `<img src="${pendingAttachment.data}" class="image-preview"><p class="mt-2">${val}</p>`;
                else userContent = `<div class="flex items-center gap-2"><i class="fa-solid fa-file"></i> ${pendingAttachment.name}</div><p class="mt-2">${val}</p>`;
            }
            
            // تمييز الرسالة إذا كانت بوضع الصور 🍌
            if (window.isBananaMode) {
                userContent = `🍌 <span class="text-yellow-600 font-bold ml-1">طلب صورة:</span> ` + userContent;
            }

            userDiv.innerHTML = `<div class="bg-[#F4F4F4] px-5 py-3.5 rounded-[1.8rem] rounded-tr-md max-w-[85%] text-gray-800 text-[15px]">${userContent}</div>`;
            dom.messageBox.appendChild(userDiv);
            
            const currentText = val;
            const currentAttach = pendingAttachment;
            const wasImageGen = window.isBananaMode;
            
            dom.chatInput.value = '';
            removeAttachment();
            dom.chatWindow.scrollTop = dom.chatWindow.scrollHeight;

            const typing = document.createElement('div');
            typing.className = 'flex items-start gap-3 animate-msg';
            typing.innerHTML = `<img src="https://i.postimg.cc/TYd6FZy0/grok-image-x6em5fj-edit-96291120058942.png" class="w-6 h-6 mt-1"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
            dom.messageBox.appendChild(typing);
            dom.chatWindow.scrollTop = dom.chatWindow.scrollHeight;

            setTimeout(async () => {
                const aiRes = wasImageGen ? "سيتم تصميم الصورة المطلوبة في أسرع وقت." : "هذا رد تجريبي من Afnan ai.";
                typing.remove();
                const botDiv = document.createElement('div');
                botDiv.className = 'flex items-start gap-3 animate-msg';
                botDiv.innerHTML = `<img src="https://i.postimg.cc/TYd6FZy0/grok-image-x6em5fj-edit-96291120058942.png" class="w-6 h-6 mt-1"><div class="bg-white border border-gray-100 px-5 py-3.5 rounded-[1.8rem] rounded-tl-md max-w-[85%] text-gray-800 text-[15px]">${aiRes}</div>`;
                dom.messageBox.appendChild(botDiv);
                dom.chatWindow.scrollTop = dom.chatWindow.scrollHeight;

                try {
                    const msgUser = { sender: 'user', text: currentText, attachment: currentAttach, isImageGenRequest: wasImageGen, timestamp: new Date() };
                    const msgBot = { sender: 'bot', text: aiRes, timestamp: new Date() };
                    if (!currentChatId) {
                        const ref = await addDoc(collection(db, 'chats'), { userId: currentUser.uid, title: currentText.split(' ').slice(0, 3).join(' '), messages: [msgUser, msgBot], createdAt: new Date(), updatedAt: new Date(), isPinned: false });
                        currentChatId = ref.id;
                    } else {
                        await updateDoc(doc(db, 'chats', currentChatId), { messages: arrayUnion(msgUser, msgBot), updatedAt: new Date() });
                    }
                    await loadChatHistory();
                } catch (e) { console.error(e); }
            }, 1000);
        };

        dom.sendBtn.onclick = handleSend;
        dom.chatInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };
        window.toast = (msg) => {
            const t = document.createElement('div');
            t.className = 'fixed bottom-24 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-2.5 rounded-full text-sm z-[2000] animate-msg shadow-lg';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        };
    </script>
</body>
</html>
