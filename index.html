<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Afnan ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="security.js"></script>
    
    <style>
        :root { --header-h: 60px; }
        html, body { height: var(--app-height); width: 100%; margin: 0; padding: 0; overflow: auto; overscroll-behavior: contain; background-color: white; -webkit-tap-highlight-color: transparent; font-family: system-ui, -apple-system, sans-serif; }
        @supports (-webkit-touch-callout: none) { body { height: -webkit-fill-available; } }
        body { display: flex; flex-direction: row; }
        .hide-scrollbar::-webkit-scrollbar { width: 0px; height: 0px; }
        .hide-scrollbar { scrollbar-width: none; }
        .sidebar-transition { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); will-change: transform; }
        #overlay { z-index: 100; }
        #sidebar { z-index: 150; }
        header { 
            z-index: 50; 
            position: relative;
            width: 100%;
            height: var(--header-h);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transform: translateZ(0);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        #chatWindow { padding-top: 10px; margin-top: 0; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-msg { animation: slideUp 0.3s ease-out forwards; }
        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        #profilePopup { display: none; position: absolute; bottom: 70px; left: 10px; width: 220px; z-index: 200; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #logoutConfirm { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; align-items: center; justify-content: center; }
        #attachMenu { display: none; position: absolute; bottom: 70px; right: 0; width: 200px; z-index: 60; border-radius: 1.2rem; }
        .action-icon { cursor: pointer; transition: color 0.2s; color: #9ca3af; }
        .action-icon:hover { color: #3b82f6; }
        .typing-indicator { display: flex; gap: 4px; padding: 12px 16px; }
        .typing-dot { width: 8px; height: 8px; border-radius: 50%; background-color: #9ca3af; animation: typing 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { opacity: 0.5; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-10px); } }
        .chat-input-container { border: none !important; outline: none !important; box-shadow: none !important; -webkit-tap-highlight-color: transparent; }
        textarea#chatInput { border: none !important; outline: none !important; box-shadow: none !important; -webkit-appearance: none; background: transparent !important; }
        input:focus, textarea:focus, select:focus, button:focus { outline: none !important; box-shadow: none !important; }
        .image-preview { max-width: 300px; max-height: 300px; border-radius: 1rem; object-fit: cover; margin-top: 8px; }
        .guest-warning { display: none; background: #fef3c7; border-left: 4px solid #f59e0b; padding: 12px; border-radius: 0.5rem; margin-bottom: 16px; font-size: 13px; color: #92400e; }
        
        /* New UI Elements */
        #chatModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 400; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 1.5rem; width: 90%; max-width: 320px; text-align: center; }
        .modal-btn { width: 100%; padding: 12px; margin-top: 8px; border-radius: 1rem; font-weight: bold; transition: 0.2s; }
        .modal-btn-pin { background: #000; color: #fff; }
        .modal-btn-delete { background: #fee2e2; color: #ef4444; }
        .modal-btn-cancel { background: #f3f4f6; color: #4b5563; }
        
        /* File Preview Area */
        #previewArea { display: flex; gap: 8px; padding: 8px; flex-wrap: wrap; border-bottom: 1px solid #eee; display: none; }
        .preview-item { position: relative; width: 60px; height: 60px; border-radius: 0.5rem; overflow: hidden; border: 1px solid #ddd; }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .preview-item .remove-preview { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.5); color: white; width: 16px; height: 16px; border-radius: 50%; display: flex; items-center; justify-content: center; font-size: 10px; cursor: pointer; }
        .file-icon-preview { display: flex; align-items: center; justify-content: center; background: #f9fafb; width: 100%; height: 100%; font-size: 20px; color: #9ca3af; }
    </style>
    <script>
        function setAppHeight() { document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`); }
        window.addEventListener('resize', setAppHeight);
        setAppHeight();
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                const header = document.querySelector('header');
                if (header) header.style.top = window.visualViewport.offsetTop + 'px';
            });
        }
    </script>
</head>
<body class="antialiased text-gray-900">
    <div id="pullRefresh" style="position: fixed; top: -50px; left: 0; right: 0; text-align: center; transition: 0.3s; font-size: 14px; color: gray; z-index: 1000;">⟳ اسحب للتحديث</div>
    <div id="overlay" class="fixed inset-0 bg-black/20 backdrop-blur-[2px] hidden transition-opacity duration-300 opacity-0"></div>

    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 w-72 bg-[#fcfcfc] border-r border-gray-100 flex flex-col transform -translate-x-full md:translate-x-0 sidebar-transition h-full shadow-lg md:shadow-none">
        <div class="p-4 flex flex-col gap-4">
            <button id="newChatBtn" class="flex items-center gap-3 w-full bg-white border border-gray-200 p-3.5 rounded-2xl hover:bg-gray-50 transition-all shadow-sm">
                <img src="https://i.postimg.cc/TYd6FZy0/grok-image-x6em5fj-edit-96291120058942.png" alt="Logo" class="w-5 h-5">
                <span class="font-bold text-gray-700 text-sm">محادثة جديدة</span>
            </button>
        </div>
        <div class="flex-1 overflow-y-auto px-4 space-y-2 hide-scrollbar" id="historyList"></div>
        <div class="p-4 border-t border-gray-100 space-y-1">
            <a href="https://service.afnanai.com" target="_blank" class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-100 transition-all text-gray-600"><i class="fa-solid fa-headset"></i><span class="text-sm font-medium">خدمة العملاء</span></a>
            <button onclick="showShareModal()" class="flex items-center gap-3 w-full p-3 rounded-xl hover:bg-gray-100 transition-all text-gray-600"><i class="fa-solid fa-share-nodes"></i><span class="text-sm font-medium">إدارة الروابط</span></button>
        </div>
        <div class="p-4 border-t border-gray-100 space-y-1 relative" id="profileSection"></div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 h-full relative">
        <header class="h-[var(--header-h)] flex items-center justify-between px-6 border-b border-gray-50 bg-white/80 backdrop-blur-md shrink-0">
            <div class="flex items-center gap-4"><button id="sidebarToggle" class="flex flex-col gap-1.5 p-1 md:hidden"><span class="w-6 h-0.5 bg-gray-600 rounded-full"></span><span class="w-4 h-0.5 bg-gray-600 rounded-full"></span></button></div>
            <div id="authButtons"><button id="loginBtnHeader" class="bg-black text-white px-6 py-2 rounded-full text-sm font-bold hover:bg-gray-800 transition-all">تسجيل الدخول</button></div>
        </header>
        <div id="chatWindow" class="flex-1 overflow-y-auto hide-scrollbar scroll-smooth">
            <div id="emptyView" class="min-h-full flex flex-col items-center justify-center text-center p-12 opacity-30 select-none">
                <img src="https://i.postimg.cc/TYd6FZy0/grok-image-x6em5fj-edit-96291120058942.png" class="w-20 h-20 mb-4 grayscale" alt="Logo">
                <h2 class="text-2xl font-bold">Afnan ai</h2>
            </div>
            <div id="messageBox" class="max-w-3xl mx-auto p-4 md:p-8 space-y-10"></div>
        </div>
        <div class="w-full bg-white p-4 md:p-8 pt-2 shrink-0 safe-pb">
            <div class="max-w-3xl mx-auto relative">
                <div id="guestWarning" class="guest-warning">⚠️ أنت تستخدم النسخة المجانية. سجل الدخول للمتابعة.</div>
                <div class="chat-input-container bg-[#F4F4F4] rounded-[2.2rem] flex flex-col focus-within:bg-white shadow-sm transition-all relative overflow-hidden">
                    <div id="previewArea"></div>
                    <div class="flex items-end gap-1.5 p-1.5">
                        <div id="attachMenu" class="glass p-3 space-y-2">
                            <div id="pickImage" class="p-2 hover:bg-gray-100 rounded-lg cursor-pointer flex items-center gap-3"><i class="fa-solid fa-image"></i> <span>صورة</span></div>
                            <div id="pickFile" class="p-2 hover:bg-gray-100 rounded-lg cursor-pointer flex items-center gap-3"><i class="fa-solid fa-file"></i> <span>ملف</span></div>
                        </div>
                        <button id="attachBtn" class="w-12 h-12 flex items-center justify-center rounded-full text-gray-400"><i class="fa-solid fa-plus text-xl"></i></button>
                        <input type="file" id="imageInput" accept="image/*" class="hidden" multiple>
                        <input type="file" id="fileInput" class="hidden" multiple>
                        <textarea id="chatInput" rows="1" placeholder="اسأل Afnan ai..." class="flex-1 bg-transparent border-none focus:ring-0 py-3 px-2 text-[16px] resize-none max-h-40 hide-scrollbar" dir="auto"></textarea>
                        <button id="sendBtn" class="w-11 h-11 bg-black text-white rounded-full flex items-center justify-center disabled:opacity-50"><i class="fa-solid fa-arrow-up"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="logoutConfirm" class="flex"><div class="glass p-8 rounded-3xl text-center max-w-xs w-full mx-4 shadow-2xl"><h3 class="text-xl font-bold mb-6">هل أنت متأكد من تسجيل الخروج؟</h3><div class="flex gap-4"><button id="confirmYes" class="flex-1 bg-black text-white py-3 rounded-2xl font-bold">نعم</button><button id="confirmNo" class="flex-1 bg-gray-100 text-gray-800 py-3 rounded-2xl font-bold">لا</button></div></div></div>
    
    <!-- Chat Action Modal -->
    <div id="chatModal" class="flex">
        <div class="modal-content glass shadow-2xl">
            <h3 class="text-lg font-bold mb-4" id="modalChatTitle">إدارة المحادثة</h3>
            <button id="pinChatBtn" class="modal-btn modal-btn-pin">تثبيت في الأعلى</button>
            <button id="deleteChatBtn" class="modal-btn modal-btn-delete">حذف المحادثة</button>
            <button id="closeModalBtn" class="modal-btn modal-btn-cancel">إلغاء</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, doc, setDoc, updateDoc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

        const firebaseConfig = { apiKey: "AIzaSyC89TjMlrtfh88o_HDgCHD42hAvXMZ6fQM", authDomain: "afnan-49d21.firebaseapp.com", projectId: "afnan-49d21", storageBucket: "afnan-49d21.firebasestorage.app", messagingSenderId: "886430112619", appId: "1:886430112619:web:278b9ea777f4dda77b0a2e", measurementId: "G-EWMJ8ZPY7X" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const analytics = getAnalytics(app);

        let currentUser = null;
        let currentChatId = null;
        let selectedFiles = [];
        let longPressTimer;
        let selectedChatId = null;
        let selectedChatData = null;

        const dom = {
            sidebar: document.getElementById('sidebar'), overlay: document.getElementById('overlay'), chatInput: document.getElementById('chatInput'), sendBtn: document.getElementById('sendBtn'), chatWindow: document.getElementById('chatWindow'), messageBox: document.getElementById('messageBox'), emptyView: document.getElementById('emptyView'), logoutConfirm: document.getElementById('logoutConfirm'), confirmYes: document.getElementById('confirmYes'), confirmNo: document.getElementById('confirmNo'), attachBtn: document.getElementById('attachBtn'), attachMenu: document.getElementById('attachMenu'), newChatBtn: document.getElementById('newChatBtn'), historyList: document.getElementById('historyList'), previewArea: document.getElementById('previewArea'), chatModal: document.getElementById('chatModal'), pinChatBtn: document.getElementById('pinChatBtn'), deleteChatBtn: document.getElementById('deleteChatBtn'), closeModalBtn: document.getElementById('closeModalBtn')
        };

        onAuthStateChanged(auth, async (user) => {
            const loginBtnHeader = document.getElementById('loginBtnHeader');
            const profileSection = document.getElementById('profileSection');
            if (!user) { currentUser = null; if (loginBtnHeader) loginBtnHeader.style.display = 'block'; profileSection.innerHTML = ''; dom.historyList.innerHTML = ''; }
            else { currentUser = user; if (loginBtnHeader) loginBtnHeader.style.display = 'none'; profileSection.innerHTML = `<div id="profileTrigger" class="flex items-center gap-3 p-2.5 rounded-2xl cursor-pointer hover:bg-gray-200/50 transition-all"><img src="${user.photoURL || 'https://via.placeholder.com/40'}" class="w-10 h-10 rounded-full bg-black object-cover"><div class="flex-1 min-w-0"><p class="text-xs font-bold truncate">${user.displayName || 'User'}</p><p class="text-xs text-gray-500 truncate">${user.email}</p></div><i class="fa-solid fa-ellipsis-vertical text-gray-300 text-xs"></i></div><div id="profilePopup" class="glass p-2 space-y-1"><a href="Mahmoud.html" class="block p-3 text-sm hover:bg-gray-100 rounded-xl transition-all">سياسة الخصوصية</a><button id="logoutBtn" class="w-full text-right p-3 text-sm hover:bg-gray-100 rounded-xl transition-all">تسجيل الخروج</button></div>`; setupProfileListeners(); await loadChatHistory(); }
        });

        const setupProfileListeners = () => {
            const profileTrigger = document.getElementById('profileTrigger');
            const profilePopup = document.getElementById('profilePopup');
            const logoutBtn = document.getElementById('logoutBtn');
            if (profileTrigger) profileTrigger.onclick = (e) => { e.stopPropagation(); profilePopup.style.display = profilePopup.style.display === 'block' ? 'none' : 'block'; };
            if (logoutBtn) logoutBtn.onclick = () => dom.logoutConfirm.style.display = 'flex';
        };

        const loadChatHistory = async () => {
            if (!currentUser) return;
            try {
                const q = query(collection(db, 'chats'), where('userId', '==', currentUser.uid), orderBy('updatedAt', 'desc'));
                const querySnapshot = await getDocs(q);
                dom.historyList.innerHTML = '';
                querySnapshot.forEach((docSnap) => {
                    const chat = docSnap.data();
                    const chatItem = document.createElement('div');
                    chatItem.className = `p-3 rounded-xl hover:bg-gray-100 transition-all cursor-pointer text-sm text-gray-700 truncate relative ${chat.isPinned ? 'bg-gray-50 border-r-4 border-black' : ''}`;
                    chatItem.innerHTML = `<span>${chat.title || 'محادثة جديدة'}</span>${chat.isPinned ? '<i class="fa-solid fa-thumbtack absolute left-3 top-4 text-[10px]"></i>' : ''}`;
                    
                    // Long Press Logic
                    chatItem.onmousedown = chatItem.ontouchstart = () => {
                        longPressTimer = setTimeout(() => {
                            selectedChatId = docSnap.id;
                            selectedChatData = chat;
                            document.getElementById('modalChatTitle').textContent = chat.title || 'محادثة جديدة';
                            dom.pinChatBtn.textContent = chat.isPinned ? 'إلغاء التثبيت' : 'تثبيت في الأعلى';
                            dom.chatModal.style.display = 'flex';
                        }, 600);
                    };
                    chatItem.onmouseup = chatItem.onmouseleave = chatItem.ontouchend = () => clearTimeout(longPressTimer);
                    chatItem.onclick = () => loadChat(docSnap.id, chat);
                    dom.historyList.appendChild(chatItem);
                });
            } catch (e) { console.error(e); }
        };

        dom.pinChatBtn.onclick = async () => {
            if (selectedChatId) {
                await updateDoc(doc(db, 'chats', selectedChatId), { isPinned: !selectedChatData.isPinned, updatedAt: new Date() });
                dom.chatModal.style.display = 'none';
                await loadChatHistory();
            }
        };

        dom.deleteChatBtn.onclick = async () => {
            if (selectedChatId && confirm('هل أنت متأكد من حذف هذه المحادثة؟')) {
                await deleteDoc(doc(db, 'chats', selectedChatId));
                dom.chatModal.style.display = 'none';
                if (currentChatId === selectedChatId) dom.newChatBtn.click();
                await loadChatHistory();
            }
        };

        dom.closeModalBtn.onclick = () => dom.chatModal.style.display = 'none';

        // File/Image Preview Logic
        const handleFiles = (files) => {
            if (selectedFiles.length + files.length > 3) { alert('يمكنك اختيار 3 ملفات كحد أقصى'); return; }
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    selectedFiles.push({ file, preview: e.target.result });
                    renderPreviews();
                };
                if (file.type.startsWith('image/')) reader.readAsDataURL(file);
                else reader.readAsText(file); // Placeholder for non-images
            });
        };

        const renderPreviews = () => {
            dom.previewArea.innerHTML = '';
            dom.previewArea.style.display = selectedFiles.length > 0 ? 'flex' : 'none';
            selectedFiles.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'preview-item';
                if (item.file.type.startsWith('image/')) div.innerHTML = `<img src="${item.preview}"><div class="remove-preview" onclick="removeFile(${index})">✕</div>`;
                else div.innerHTML = `<div class="file-icon-preview"><i class="fa-solid fa-file"></i></div><div class="remove-preview" onclick="removeFile(${index})">✕</div>`;
                dom.previewArea.appendChild(div);
            });
        };

        window.removeFile = (index) => { selectedFiles.splice(index, 1); renderPreviews(); };

        document.getElementById('pickImage').onclick = () => document.getElementById('imageInput').click();
        document.getElementById('pickFile').onclick = () => document.getElementById('fileInput').click();
        document.getElementById('imageInput').onchange = (e) => handleFiles(e.target.files);
        document.getElementById('fileInput').onchange = (e) => handleFiles(e.target.files);

        const handleSend = async () => {
            const val = dom.chatInput.value.trim();
            if (!val && selectedFiles.length === 0) return;
            dom.emptyView.style.display = 'none';
            
            const userMsg = document.createElement('div');
            userMsg.className = 'flex flex-col items-end gap-2 animate-msg';
            let msgHTML = `<div class="bg-[#F4F4F4] px-5 py-3.5 rounded-[1.8rem] rounded-tr-md max-w-[85%] text-gray-800 text-[15px]">`;
            selectedFiles.forEach(f => {
                if (f.file.type.startsWith('image/')) msgHTML += `<img src="${f.preview}" class="image-preview mb-2">`;
                else msgHTML += `<div class="flex items-center gap-2 mb-2"><i class="fa-solid fa-file"></i> ${f.file.name}</div>`;
            });
            if (val) msgHTML += `<p>${val}</p>`;
            msgHTML += `</div>`;
            userMsg.innerHTML = msgHTML;
            dom.messageBox.appendChild(userMsg);
            
            // AI Response logic remains the same (mocked for now)
            dom.chatInput.value = '';
            selectedFiles = [];
            renderPreviews();
            dom.chatWindow.scrollTop = dom.chatWindow.scrollHeight;
            
            // Save to Firebase logic here...
        };

        dom.sendBtn.onclick = handleSend;
        dom.newChatBtn.onclick = () => { dom.messageBox.innerHTML = ''; dom.emptyView.style.display = 'flex'; currentChatId = null; };
        dom.confirmYes.onclick = async () => { await signOut(auth); location.reload(); };
        dom.confirmNo.onclick = () => dom.logoutConfirm.style.display = 'none';
        dom.attachBtn.onclick = (e) => { e.stopPropagation(); dom.attachMenu.style.display = dom.attachMenu.style.display === 'block' ? 'none' : 'block'; };
        document.getElementById('sidebarToggle').onclick = () => { dom.sidebar.classList.toggle('-translate-x-full'); dom.overlay.classList.toggle('hidden'); dom.overlay.style.opacity = '1'; };
        dom.overlay.onclick = () => { dom.sidebar.classList.add('-translate-x-full'); dom.overlay.classList.add('hidden'); };
    </script>
</body>
</html>
