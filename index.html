<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Afnan ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="app.css">
    <script src="security.js"></script>
    <script src="app.js" defer></script>
    <style>
        /* Floating Preview Animation */
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .floating-preview-container {
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        /* Smooth Transitions */
        .sidebar-transition { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .attach-item { transition: all 0.2s ease; }
        .attach-item:hover { transform: translateX(-5px); }
        /* Active Mode Icon Style */
        #activeModeIndicator {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="antialiased text-gray-900">

    <div id="pullRefresh" style="position: fixed; top: -50px; left: 0; right: 0; text-align: center; transition: 0.3s; font-size: 14px; color: gray; z-index: 1000;">
        ⟳ اسحب للتحديث
    </div>

    <div id="overlay" class="fixed inset-0 bg-black/20 backdrop-blur-[2px] hidden transition-opacity duration-300 opacity-0" style="z-index: 100;"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 w-72 bg-[#fcfcfc] border-r border-gray-100 flex flex-col transform -translate-x-full md:translate-x-0 sidebar-transition h-full shadow-lg md:shadow-none">
        <div class="p-4 flex flex-col gap-4">
            <button id="newChatBtn" class="flex items-center gap-3 w-full bg-white border border-gray-200 p-3.5 rounded-2xl hover:bg-gray-50 transition-all shadow-sm active:scale-95">
                <img src="https://i.postimg.cc/TYd6FZy0/grok-image-x6em5fj-edit-96291120058942.png" alt="Logo" class="w-5 h-5">
                <span class="font-bold text-gray-700 text-sm">محادثة جديدة</span>
            </button>
        </div>
        
        <div class="flex-1 overflow-y-auto px-4 space-y-2 hide-scrollbar" id="historyList">
            <!-- Chat History will be loaded here from Firestore -->
        </div>

        <div class="p-4 border-t border-gray-100 space-y-1">
            <a href="https://service.afnanai.com" target="_blank" class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-100 transition-all text-gray-600">
                <i class="fa-solid fa-headset"></i>
                <span class="text-sm font-medium">خدمة العملاء</span>
            </a>
            <button onclick="showShareModal()" class="flex items-center gap-3 w-full p-3 rounded-xl hover:bg-gray-100 transition-all text-gray-600">
                <i class="fa-solid fa-share-nodes"></i>
                <span class="text-sm font-medium">إدارة الروابط</span>
            </button>
        </div>

        <div class="p-4 border-t border-gray-100 space-y-1 relative" id="profileSection"></div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0 h-full relative">
        <header class="h-[var(--header-h)] flex items-center justify-between px-6 border-b border-gray-50 bg-white/80 backdrop-blur-md shrink-0">
            <div class="flex items-center gap-4">
                <button id="sidebarToggle" class="flex flex-col gap-1.5 p-1 md:hidden">
                    <span class="w-6 h-0.5 bg-gray-600 rounded-full"></span>
                    <span class="w-4 h-0.5 bg-gray-600 rounded-full"></span>
                </button>
            </div>
            <div class="flex items-center gap-4">
                <div id="authButtons">
                    <button id="loginBtnHeader" onclick="window.navigateToPage('login.html')" class="bg-black text-white px-6 py-2 rounded-full text-sm font-bold hover:bg-gray-800 transition-all">تسجيل الدخول</button>
                </div>
            </div>
        </header>

        <div id="chatWindow" class="flex-1 overflow-y-auto hide-scrollbar scroll-smooth">
            <div id="emptyView" class="min-h-full flex flex-col items-center justify-center text-center p-12 opacity-30 select-none">
                <img src="https://i.postimg.cc/TYd6FZy0/grok-image-x6em5fj-edit-96291120058942.png" class="w-20 h-20 mb-4 grayscale" alt="Logo">
                <h2 class="text-2xl font-bold">Afnan ai</h2>
            </div>
            <div id="messageBox" class="max-w-3xl mx-auto p-4 md:p-8 space-y-10"></div>
        </div>

        <div class="w-full bg-white p-4 md:p-8 pt-2 shrink-0 safe-pb">
            <div class="max-w-3xl mx-auto relative">
                
                <!-- Floating Attachment Preview (Above Input) -->
                <div id="attachmentPreview" class="absolute bottom-full left-0 mb-4 hidden floating-preview-container" style="z-index: 500;">
                    <!-- Preview content will be injected here -->
                </div>

                <div class="chat-input-container bg-[#F4F4F4] rounded-[2.2rem] flex flex-col shadow-sm transition-all relative overflow-visible">
                    <div class="flex items-end gap-1.5 p-1.5 focus-within:bg-white rounded-[2.2rem] relative transition-all duration-300">
                        
                        <!-- Main Toggle Button & Active Mode -->
                        <div class="relative flex items-center gap-1">
                            <button id="mainAttachBtn" type="button" class="w-11 h-11 flex items-center justify-center rounded-full text-gray-900 bg-white shadow-sm cursor-pointer transition-all active:scale-90" style="z-index: 1100;">
                                <i class="fa-solid fa-plus text-lg pointer-events-none"></i>
                            </button>

                            <!-- Active Mode Icon (No Background, Colored) -->
                            <div id="activeModeIndicator" class="hidden relative group items-center justify-center w-8 h-8 transition-all duration-300">
                                <i id="modeIcon" class="fa-solid fa-brain text-lg"></i>
                                <button id="cancelModeBtn" class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white rounded-full flex items-center justify-center text-[8px] border border-white shadow-sm opacity-0 group-hover:opacity-100 transition-opacity"><i class="fa-solid fa-xmark"></i></button>
                            </div>
                            
                            <!-- Integrated Attachment & Model Menu -->
                            <div id="mainAttachMenu" class="glass p-1.5 hidden" style="position: absolute; bottom: 55px; right: 0; width: 240px; z-index: 1200; border-radius: 2rem; box-shadow: 0 10px 40px rgba(0,0,0,0.15); animation: slideUp 0.2s ease-out;">
                                <div class="space-y-0.5">
                                    <div id="optImage" class="attach-item p-2.5 hover:bg-gray-100 rounded-2xl cursor-pointer flex items-center justify-between">
                                        <span class="text-xs font-bold text-gray-700">إرفاق صور</span>
                                        <div class="w-8 h-8 bg-blue-50 rounded-full flex items-center justify-center"><i class="fa-solid fa-image text-blue-500 text-xs"></i></div>
                                    </div>
                                    <div id="optFile" class="attach-item p-2.5 hover:bg-gray-100 rounded-2xl cursor-pointer flex items-center justify-between">
                                        <span class="text-xs font-bold text-gray-700">إرفاق ملفات</span>
                                        <div class="w-8 h-8 bg-purple-50 rounded-full flex items-center justify-center"><i class="fa-solid fa-paperclip text-purple-500 text-xs"></i></div>
                                    </div>
                                    <div id="optWeb" class="attach-item p-2.5 hover:bg-gray-100 rounded-2xl cursor-pointer flex items-center justify-between">
                                        <span class="text-xs font-bold text-gray-700">البحث في الويب</span>
                                        <div class="w-8 h-8 bg-green-50 rounded-full flex items-center justify-center"><i class="fa-solid fa-globe text-green-500 text-xs"></i></div>
                                    </div>
                                    <div id="optBrain" class="attach-item p-2.5 hover:bg-gray-100 rounded-2xl cursor-pointer flex items-center justify-between">
                                        <span class="text-xs font-bold text-gray-700">التفكير العميق</span>
                                        <div class="w-8 h-8 bg-yellow-50 rounded-full flex items-center justify-center"><i class="fa-solid fa-lightbulb text-yellow-500 text-xs"></i></div>
                                    </div>
                                    <!-- Integrated Models -->
                                    <div class="border-t border-gray-50 my-1 pt-1">
                                        <div onclick="window.selectModel('Afnan-1.5', 'fa-bolt', '#3b82f6')" class="attach-item p-2.5 hover:bg-gray-100 rounded-2xl cursor-pointer flex items-center justify-between">
                                            <span class="text-xs font-bold text-gray-700">Afnan-1.5</span>
                                            <div class="w-8 h-8 bg-blue-50 rounded-full flex items-center justify-center"><i class="fa-solid fa-bolt text-blue-500 text-xs"></i></div>
                                        </div>
                                        <div onclick="window.selectModel('Afnan-pro', 'fa-star', '#a855f7')" class="attach-item p-2.5 hover:bg-gray-100 rounded-2xl cursor-pointer flex items-center justify-between">
                                            <span class="text-xs font-bold text-gray-700">Afnan-pro</span>
                                            <div class="w-8 h-8 bg-purple-50 rounded-full flex items-center justify-center"><i class="fa-solid fa-star text-purple-500 text-xs"></i></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <input type="file" id="imageInput" accept="image/*" class="hidden">
                        <input type="file" id="fileInput" class="hidden">
                        
                        <textarea id="chatInput" rows="1" placeholder="اسأل Afnan ai..." class="flex-1 bg-transparent border-none focus:ring-0 py-3 px-2 text-[16px] resize-none max-h-40 hide-scrollbar" dir="auto"></textarea>
                        
                        <div class="flex items-center gap-2 mb-1 mr-1">
                            <button id="sendBtn" class="w-11 h-11 bg-black text-white rounded-full flex items-center justify-center disabled:opacity-50 transition-all active:scale-90"><i class="fa-solid fa-arrow-up"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Image Viewer Modal -->
    <div id="imageViewer" class="fixed inset-0 bg-black z-[4000] hidden flex-col">
        <div class="flex justify-between items-center p-6 text-white">
            <button onclick="window.closeImageViewer()" class="text-2xl"><i class="fa-solid fa-xmark"></i></button>
            <button id="deleteImageBtn" class="text-xl text-red-500"><i class="fa-solid fa-trash-can"></i></button>
        </div>
        <div class="flex-1 flex items-center justify-center p-4">
            <img id="viewerImg" src="" class="max-w-full max-h-full object-contain rounded-xl">
        </div>
    </div>

    <div id="logoutConfirm" class="hidden fixed inset-0 bg-black/40 z-[300] items-center justify-center">
        <div class="glass p-8 rounded-3xl text-center max-w-xs w-full mx-4 shadow-2xl">
            <h3 class="text-xl font-bold mb-6">هل أنت متأكد من تسجيل الخروج؟</h3>
            <div class="flex gap-4">
                <button id="confirmYes" class="flex-1 bg-black text-white py-3 rounded-2xl font-bold">نعم</button>
                <button id="confirmNo" class="flex-1 bg-gray-100 text-gray-800 py-3 rounded-2xl font-bold">لا</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
